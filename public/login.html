<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ConcertVibe</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="/" style="display:block;text-align:center;margin-bottom:var(--space-xl);font-size:1.6rem;font-family:var(--font-display);font-weight:800;">
        🎵 <span class="text-gradient">ConcertVibe</span>
      </a>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to access your tickets and bookings</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="loginBtn">Sign In</button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
      <div style="text-align:center;margin-top:var(--space-md);">
        <a href="/admin/login.html" style="font-size:0.8rem;color:var(--text-muted);">Admin Login →</a>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
