<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ConcertVibe</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-auth-page">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:var(--space-xl);"><span style="font-size:2.5rem;">🛡️</span></div>
      <h1>Admin Panel</h1>
      <p class="subtitle">Sign in to manage concerts and bookings</p>
      <form id="adminLoginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" class="form-input" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" class="form-input" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="adminLoginBtn">Sign In</button>
      </form>
      <div class="auth-footer"><a href="/">← Back to ConcertVibe</a></div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (getAdminToken()) { window.location.href = '/admin/dashboard.html'; return; }
      document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('adminLoginBtn');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        btn.disabled = true; btn.textContent = 'Signing in...';
        try {
          const data = await api.post('/admin/login', { username, password });
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('admin', JSON.stringify(data.admin));
          showToast('Welcome, Admin!', 'success');
          setTimeout(() => window.location.href = '/admin/dashboard.html', 500);
        } catch (error) {
          showToast(error.message, 'error');
        } finally { btn.disabled = false; btn.textContent = 'Sign In'; }
      });
    });
  </script>
</body>
</html>
