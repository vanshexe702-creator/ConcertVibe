<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Admin Panel</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/pages.css">
  <link rel="stylesheet" href="/css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- Admin Navbar -->
  <nav class="navbar">
    <a href="/admin/dashboard.html" class="navbar-brand"><span class="icon">🛡️</span><span>Admin Panel</span></a>
    <div class="navbar-actions">
      <a href="/" class="btn btn-ghost btn-sm" target="_blank">View Site</a>
      <button class="btn btn-danger btn-sm" id="adminLogout">Logout</button>
    </div>
  </nav>

  <div class="admin-layout">
    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header"><h3>Navigation</h3></div>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html" class="active"><span class="nav-icon">📊</span>Dashboard</a>
        <a href="/admin/concerts.html"><span class="nav-icon">🎵</span>Concerts</a>
        <a href="/admin/bookings.html"><span class="nav-icon">🎫</span>Bookings</a>
        <a href="/admin/seats.html"><span class="nav-icon">🪑</span>Seat Management</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-page-header">
        <h1>📊 Revenue Dashboard</h1>
        <span style="color:var(--text-muted);" id="dashboardDate"></span>
      </div>

      <!-- Stats Cards -->
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-info"><h4>Total Revenue</h4><div class="stat-value" id="statRevenue">$0</div></div><div class="stat-icon purple">💰</div></div>
        <div class="stat-card"><div class="stat-info"><h4>Total Bookings</h4><div class="stat-value" id="statBookings">0</div></div><div class="stat-icon cyan">🎫</div></div>
        <div class="stat-card"><div class="stat-info"><h4>Tickets Sold</h4><div class="stat-value" id="statTickets">0</div></div><div class="stat-icon pink">🎟️</div></div>
        <div class="stat-card"><div class="stat-info"><h4>Total Users</h4><div class="stat-value" id="statUsers">0</div></div><div class="stat-icon green">👥</div></div>
        <div class="stat-card"><div class="stat-info"><h4>Active Concerts</h4><div class="stat-value" id="statConcerts">0</div></div><div class="stat-icon yellow">🎵</div></div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card"><h3>📈 Monthly Revenue</h3><canvas id="revenueChart"></canvas></div>
        <div class="chart-card"><h3>🏆 Popular Concerts</h3><canvas id="popularChart"></canvas></div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="/js/api.js"></script>
  <script src="/js/admin/dashboard.js"></script>
</body>
</html>
